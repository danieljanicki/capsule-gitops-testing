---
apiVersion: capsule.clastix.io/v1beta2
kind: Tenant
metadata:
  name: new
spec:
  additionalRoleBindings:
  - clusterRoleName: cluster-admin
    subjects:
    - name: gitops-reconciler
      kind: ServiceAccount
      namespace: new-home
  owners:
  - name: system:serviceaccount:new-home:gitops-reconciler
    kind: ServiceAccount
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    capsule.clastix.io/tenant: new
  name: new-home
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitops-reconciler
  namespace: new-home
